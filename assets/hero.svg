<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hussain S. — Applied AI Engineer. Governed agents, geospatial ML, robotics.">
  <defs>
    <radialGradient id="bgGlow" cx="68%" cy="40%" r="85%">
      <stop offset="0%" stop-color="#101B33"/>
      <stop offset="55%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#070D18"/>
    </radialGradient>
    <linearGradient id="nameShimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#F8FAFC"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="50%" stop-color="#22C55E"/>
      <stop offset="55%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
      <animate attributeName="x1" values="-100%;100%" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0%;200%" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="beamGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#22C55E" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#22C55E" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="underline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0"/>
    </linearGradient>
    <style>
      .mono  { font-family: ui-monospace, "Cascadia Code", "SF Mono", Consolas, monospace; }
      .sans  { font-family: -apple-system, "Segoe UI", Inter, Roboto, sans-serif; }
      .node  { fill:#3B5BA5; }
      .nodeOn{ fill:#22C55E; }
      .edge  { stroke:#27395C; stroke-width:1.2; stroke-dasharray:5 7; animation: flow 9s linear infinite; }
      .edgeHot{ stroke:#22C55E; stroke-opacity:.55; stroke-width:1.4; stroke-dasharray:4 9; animation: flow 5s linear infinite; }
      .pulse  { animation: breathe 4.2s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .p2 { animation-delay: -1.3s; }
      .p3 { animation-delay: -2.1s; }
      .p4 { animation-delay: -3.2s; }
      .role { animation: roles 12s infinite; opacity:0; }
      .r2 { animation-delay: 4s; }
      .r3 { animation-delay: 8s; }
      .beam { animation: sweep 14s ease-in-out infinite; }
      .blink { animation: blink 1.1s steps(2) infinite; }
      @keyframes flow    { to { stroke-dashoffset: -120; } }
      @keyframes breathe { 0%,100% { opacity:.45; transform:scale(1);} 50% { opacity:1; transform:scale(1.45);} }
      @keyframes roles   { 0%,4% {opacity:0;} 8%,28% {opacity:1;} 33%,100% {opacity:0;} }
      @keyframes sweep   { 0% { transform:translateX(-160px);} 55%,100% { transform:translateX(1380px);} }
      @keyframes blink   { 50% { opacity:0; } }
      @media (prefers-reduced-motion: reduce) {
        .edge,.edgeHot,.pulse,.beam,.blink { animation:none; }
        .role { animation:none; opacity:0; }
        .role.r1 { opacity:1; }
      }
    </style>
  </defs>

  <!-- backdrop -->
  <rect width="1280" height="320" fill="url(#bgGlow)"/>
  <!-- faint geospatial grid -->
  <g stroke="#16233D" stroke-width="1">
    <path d="M0 80h1280M0 160h1280M0 240h1280"/>
    <path d="M160 0v320M320 0v320M480 0v320M640 0v320M800 0v320M960 0v320M1120 0v320"/>
  </g>
  <!-- scan beam -->
  <rect class="beam" x="0" y="0" width="160" height="320" fill="url(#beamGrad)"/>

  <!-- ── signal lattice (right field) — bright cluster seeded at 25.2N 55.3E ── -->
  <g>
    <path class="edge"    d="M790 250 L900 196 L1012 232 L1108 160"/>
    <path class="edge"    d="M900 196 L948 110 L1064 86"/>
    <path class="edgeHot" d="M838 92 L948 110 L1012 232"/>
    <path class="edge"    d="M1064 86 L1108 160 L1196 122"/>
    <path class="edgeHot" d="M948 110 L1108 160"/>
    <path class="edge"    d="M790 250 L838 92"/>
    <path class="edge"    d="M1012 232 L1196 250 L1108 160"/>

    <circle class="node pulse"    cx="790"  cy="250" r="4"/>
    <circle class="node pulse p2" cx="838"  cy="92"  r="4"/>
    <circle class="nodeOn pulse p3" cx="900" cy="196" r="5"/>
    <circle class="nodeOn pulse"  cx="948"  cy="110" r="6"/>
    <circle class="node pulse p4" cx="1012" cy="232" r="4"/>
    <circle class="node pulse p2" cx="1064" cy="86"  r="4"/>
    <circle class="nodeOn pulse p4" cx="1108" cy="160" r="5"/>
    <circle class="node pulse p3" cx="1196" cy="122" r="4"/>
    <circle class="node pulse"    cx="1196" cy="250" r="3.5"/>

    <!-- signal packets travelling the hot paths -->
    <circle r="3" fill="#22C55E">
      <animateMotion dur="5s" repeatCount="indefinite" path="M838 92 L948 110 L1012 232"/>
    </circle>
    <circle r="2.5" fill="#22C55E" opacity="0.8">
      <animateMotion dur="7s" repeatCount="indefinite" path="M948 110 L1108 160 L1196 250" begin="-2.5s"/>
    </circle>
  </g>

  <!-- ── identity block (left) ── -->
  <text class="mono" x="64" y="92" font-size="15" fill="#22C55E">~/hussain $ <tspan fill="#7C8DB0">whoami</tspan><tspan class="blink" fill="#22C55E">▌</tspan></text>

  <text class="sans" x="62" y="170" font-size="64" font-weight="800" letter-spacing="1.5" fill="url(#nameShimmer)">HUSSAIN S.</text>
  <rect x="64" y="188" width="360" height="3" rx="1.5" fill="url(#underline)"/>

  <!-- rotating roles -->
  <g class="sans" font-size="22" font-weight="500">
    <text class="role r1" x="64" y="232" fill="#A9B8D4">Applied AI Engineer — governed agents that answer for their decisions</text>
    <text class="role r2" x="64" y="232" fill="#A9B8D4">Geospatial ML — urban heat &amp; growth, seen from orbit</text>
    <text class="role r3" x="64" y="232" fill="#A9B8D4">Robotics — software that survives contact with the real world</text>
  </g>

  <!-- doctrine line -->
  <text class="mono" x="64" y="276" font-size="14" fill="#5B6B8C">LLM reads. Deterministic code decides. Humans own the exceptions.</text>

  <!-- seeded coordinates — the quiet reference -->
  <text class="mono" x="1216" y="300" font-size="11" fill="#33415E" text-anchor="end">25.2°N 55.3°E</text>
</svg>
